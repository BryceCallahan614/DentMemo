<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DentMemo - 医学名词解释背诵</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 全局字体设置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Canvas 星空背景 */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 渐变背景 */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* 毛玻璃效果容器 */
        .glass-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* 按钮样式 */
        .btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            padding: 14px 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
        }

        /* 输入框样式 */
        .input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            padding: 16px 20px;
            width: 100%;
            outline: none;
            transition: all 0.3s ease;
        }

        .input:focus {
            border-color: rgba(102, 126, 234, 0.6);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* 文本域样式 */
        .textarea {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            padding: 16px 20px;
            width: 100%;
            min-height: 150px;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
            line-height: 1.6;
        }

        .textarea:focus {
            border-color: rgba(102, 126, 234, 0.6);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* 页面容器 - 使用opacity和visibility实现平滑过渡 */
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.4s ease, visibility 0.4s ease, transform 0.4s ease;
            transform: translateY(20px);
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* 首页样式 */
        .home-page {
            max-width: 500px;
        }

        .home-title {
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            text-align: center;
        }

        .home-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            text-align: center;
        }

        .section {
            margin-bottom: 30px;
            padding: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
        }

        /* 文件上传区域 */
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: rgba(102, 126, 234, 0.6);
            background: rgba(102, 126, 234, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        #fileInput {
            display: none;
        }

        /* 按钮组 */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn.active {
            background: rgba(102, 126, 234, 0.4);
            border-color: rgba(102, 126, 234, 0.6);
        }

        /* 数量输入 */
        .quantity-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quantity-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            white-space: nowrap;
        }

        /* 开始按钮 */
        .start-btn {
            width: 100%;
            font-size: 20px;
            padding: 18px;
            margin-top: 10px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }
        
        .stat-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-item-value {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }
        
        .stat-item-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 背诵模式样式 */
        .recall-page {
            max-width: 700px;
        }

        .chinese-term {
            font-size: 36px;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .english-term {
            font-size: 24px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .definition-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1.8;
        }

        .definition-text {
            font-size: 18px;
            color: white;
            line-height: 1.8;
        }

        .highlight {
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .highlight:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        /* 模糊效果 */
        .blurred {
            filter: blur(8px);
            user-select: none;
        }

        .blur-section {
            cursor: pointer;
        }

        /* 默写模式样式 */
        .dictation-page {
            max-width: 650px;
        }

        /* 管理页面 */
        .manage-page {
            max-width: 900px;
            padding: 20px;
            align-items: flex-start;
            justify-content: flex-start;
            padding-top: 60px;
        }
        
        .manage-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .manage-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
        }
        
        .manage-actions {
            display: flex;
            gap: 12px;
        }
        
        .term-table-container {
            width: 100%;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 16px;
        }
        
        .term-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .term-table th,
        .term-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .term-table th {
            background: rgba(102, 126, 234, 0.2);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .term-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .term-table tr:last-child td {
            border-bottom: none;
        }
        
        .checkbox-cell {
            width: 50px;
            text-align: center;
        }
        
        .checkbox-cell input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
        }
        
        select option {
            background: #1e293b;
            color: white;
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 16px;
            font-size: 14px;
        }

        /* 进度条 */
        .progress-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* 文件信息 */
        .file-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .file-name {
            color: white;
            font-weight: 500;
        }
        
        .file-count {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        /* 完成页面 */
        .complete-page {
            max-width: 600px;
        }
        
        .complete-emoji {
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .complete-title {
            font-size: 40px;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .modal {
            max-width: 400px;
            width: 100%;
            padding: 32px;
            text-align: center;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
        }

        .modal-text {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .home-title {
                font-size: 28px;
            }

            .chinese-term {
                font-size: 28px;
            }

            .english-term {
                font-size: 20px;
            }

            .definition-text {
                font-size: 16px;
            }

            .stat-item-value {
                font-size: 24px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 15px;
            }

            .btn-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 渐变背景 -->
    <div class="gradient-bg" id="gradientBg"></div>
    
    <!-- 星空 Canvas -->
    <canvas id="starCanvas"></canvas>

    <!-- 首页 -->
    <div id="homePage" class="page home-page active">
        <h1 class="home-title">✨ DentMemo</h1>
        <p class="home-subtitle">医学名词解释背诵</p>

        <!-- 文件上传区域 -->
        <div class="section glass-container">
            <h2 class="section-title">📚 导入名词解释笔记本</h2>
            <div id="fileInfo" class="file-info" style="display: none;">
                <div>
                    <div class="file-name" id="fileName"></div>
                    <div class="file-count" id="fileCount"></div>
                </div>
                <button class="btn btn-danger" id="clearFileBtn">清除</button>
            </div>
            <div id="uploadArea" class="upload-area">
                <div class="upload-icon">📄</div>
                <div class="upload-text">点击导入 .txt 文件<br><small style="font-size: 12px; color: rgba(255,255,255,0.5);">格式：中文（英文）：释义</small></div>
                <input type="file" id="fileInput" accept=".txt">
            </div>
        </div>

        <!-- 学习统计 -->
        <div class="section glass-container" id="statsSection" style="display: none;">
            <h2 class="section-title">📈 学习统计</h2>
            <div class="stats-grid" id="homeStatsGrid">
            </div>
        </div>

        <!-- 学习模式 -->
        <div class="section glass-container" id="modeSection" style="display: none;">
            <h2 class="section-title">🎯 学习模式</h2>
            <div class="btn-group">
                <button class="btn active" data-mode="recall">背诵模式</button>
                <button class="btn" data-mode="dictation">默写模式</button>
            </div>
        </div>

        <!-- 学习顺序 -->
        <div class="section glass-container" id="settingsSection" style="display: none;">
            <h2 class="section-title">🔄 学习顺序</h2>
            <div class="btn-group">
                <button class="btn active" data-order="normal">正序</button>
                <button class="btn" data-order="reverse">倒序</button>
                <button class="btn" data-order="random">随机</button>
            </div>
        </div>

        <!-- 学习数量 -->
        <div class="section glass-container" id="quantitySection" style="display: none;">
            <h2 class="section-title">📊 学习数量</h2>
            <div class="quantity-group">
                <label class="quantity-label">请输入学习数量（最多100）：</label>
                <input type="number" class="input" id="quantityInput" min="1" max="100" value="10">
            </div>
        </div>

        <!-- 管理按钮和开始按钮 -->
        <div id="startSection" style="display: none; width: 100%;">
            <div class="btn-group" style="margin-bottom: 16px;">
                <button class="btn" id="manageBtn">管理名词</button>
            </div>
            <button class="btn btn-primary start-btn" id="startBtn">开始学习 🚀</button>
        </div>
    </div>

    <!-- 背诵模式页面 -->
    <div id="recallPage" class="page recall-page">
        <button class="btn back-btn" id="recallBackBtn">← 返回</button>
        <div class="progress-text" id="recallProgressText">1 / 10</div>
        <div class="progress-bar">
            <div class="progress-fill" id="recallProgressFill" style="width: 0%;"></div>
        </div>

        <div class="chinese-term blur-section" id="chineseTerm" data-blur-state="visible"></div>
        <div class="english-term blur-section" id="englishTerm" data-blur-state="blurred" style="display: none;"></div>
        <div class="definition-box blur-section" id="definitionBox" data-blur-state="blurred"></div>

        <button class="btn btn-primary start-btn" id="recallNextBtn">背出来了 ✅</button>
    </div>

    <!-- 默写模式页面 -->
    <div id="dictationPage" class="page dictation-page">
        <button class="btn back-btn" id="dictationBackBtn">← 返回</button>
        <div class="progress-text" id="dictationProgressText">1 / 10</div>
        <div class="progress-bar">
            <div class="progress-fill" id="dictationProgressFill" style="width: 0%;"></div>
        </div>

        <div class="chinese-term" id="dictationChineseTerm"></div>
        <div class="english-term" id="dictationEnglishTerm" style="display: none;"></div>
        <textarea class="textarea" id="dictationInput" placeholder="请输入完整释义..."></textarea>
        <div class="definition-box" id="dictationAnswer" style="display: none;"></div>

        <div class="btn-group" id="dictationButtons">
            <button class="btn" id="dictationDontKnow">不认识</button>
            <button class="btn btn-primary" id="dictationConfirm">确认</button>
        </div>
        
        <div class="btn-group" id="dictationAnswerButtons" style="display: none;">
            <button class="btn btn-danger" id="dictationSkip">暂不默写</button>
            <button class="btn btn-primary" id="dictationRemembered">记住了</button>
        </div>
    </div>

    <!-- 管理页面 -->
    <div id="managePage" class="page manage-page">
        <div class="manage-header">
                <h1 class="manage-title">📋 名词管理</h1>
                <div class="manage-actions">
                    <!-- 新增：一键未学按钮 -->
                    <button class="btn btn-small btn-danger" id="resetAllBtn">一键未学</button>
                    <button class="btn btn-small" id="manageBackBtn">返回首页</button>
                </div>
            </div>
        
        <div class="section glass-container term-table-container">
            <table class="term-table" id="termTable">
                <thead>
                    <tr>
                        <th class="checkbox-cell">不默了</th>
                        <th>中文名词</th>
                        <th style="width: 120px;">学习状态</th>
                    </tr>
                </thead>
                <tbody id="termTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- 完成页面 -->
    <div id="completePage" class="page complete-page">
        <div class="complete-emoji">🎉</div>
        <h1 class="complete-title">学习完成！</h1>

        <div class="stats-grid">
            <div class="stat-item glass-container">
                <div class="stat-item-value" id="statTotalLearned">0</div>
                <div class="stat-item-label">学习数量</div>
            </div>
            <div class="stat-item glass-container">
                <div class="stat-item-value" id="statDictationCount">0</div>
                <div class="stat-item-label">默写数量</div>
            </div>
            <div class="stat-item glass-container">
                <div class="stat-item-value" id="statErrorCount">0</div>
                <div class="stat-item-label">错误数量</div>
            </div>
            <div class="stat-item glass-container">
                <div class="stat-item-value" id="statSkipCount">0</div>
                <div class="stat-item-label">暂不默写</div>
            </div>
        </div>

        <!-- 新增：累计错误统计表格 -->
        <div class="section glass-container" id="errorStatsSection" style="display: none; margin-top: 20px; max-height: 300px; overflow-y: auto;">
            <h2 class="section-title">📊 累计错误统计</h2>
            <table class="term-table" id="errorStatsTable">
                <thead>
                    <tr>
                        <th>名词</th>
                        <th>本次错误</th>
                        <th>累计错误</th>
                    </tr>
                </thead>
                <tbody id="errorStatsTableBody">
                </tbody>
            </table>
        </div>

        <div class="btn-group" style="margin-top: 20px;">
            <button class="btn btn-primary" id="exportStatsBtn">导出学习记录</button>
            <button class="btn" id="backHomeBtn">返回首页</button>
        </div>
    </div>

    <!-- 新增：一键未学确认对话框 -->
    <div class="modal-overlay" id="resetConfirmModal">
        <div class="modal glass-container">
            <h2 class="modal-title">⚠️ 确认操作</h2>
            <p class="modal-text">确认后所有名词都将恢复未学习状态，是否确认？</p>
            <div class="modal-buttons">
                <button class="btn" id="resetCancelBtn">取消</button>
                <button class="btn btn-primary" id="resetConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 工具函数 ====================
        class Utils {
            static random(min, max) {
                return Math.random() * (max - min) + min;
            }

            static shuffle(array) {
                const result = [...array];
                for (let i = result.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }

            static randomColor() {
                const colors = [
                    '#081229', '#13294B', '#1E3A5F',
                    '#0f172a', '#1e293b', '#334155',
                    '#0c1929', '#14213d', '#0b1d34'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
        }

        // ==================== 本地存储管理 ====================
        class StorageManager {
            constructor() {
                this.KEY_TERMS = 'dentmemo_terms';
                this.KEY_STATES = 'dentmemo_states';
                this.KEY_FILE_NAME = 'dentmemo_filename';
                this.KEY_SETTINGS = 'dentmemo_settings';
                this.KEY_STATS = 'dentmemo_wordstats'; // 新增：学习记录统计
            }

            saveTerms(terms) {
                localStorage.setItem(this.KEY_TERMS, JSON.stringify(terms));
            }

            getTerms() {
                const data = localStorage.getItem(this.KEY_TERMS);
                return data ? JSON.parse(data) : null;
            }

            saveStates(states) {
                localStorage.setItem(this.KEY_STATES, JSON.stringify(states));
            }

            getStates() {
                const data = localStorage.getItem(this.KEY_STATES);
                return data ? JSON.parse(data) : {};
            }

            getOrCreateState(chinese) {
                const states = this.getStates();
                if (!states[chinese]) {
                    states[chinese] = {
                        state: 'unlearned',
                        skip: false
                    };
                    this.saveStates(states);
                }
                return states[chinese];
            }

            updateState(chinese, updates) {
                const states = this.getStates();
                states[chinese] = {
                    ...(states[chinese] || { state: 'unlearned', skip: false }),
                    ...updates
                };
                this.saveStates(states);
            }

            // 新增：获取学习统计
            getWordStats() {
                const data = localStorage.getItem(this.KEY_STATS);
                return data ? JSON.parse(data) : {};
            }

            // 新增：保存学习统计
            saveWordStats(stats) {
                localStorage.setItem(this.KEY_STATS, JSON.stringify(stats));
            }

            // 新增：记录正确答案
            recordCorrect(chinese) {
                const stats = this.getWordStats();
                if (!stats[chinese]) {
                    stats[chinese] = { correct: 0, wrong: 0 };
                }
                stats[chinese].correct++;
                this.saveWordStats(stats);
            }

            // 新增：记录错误答案
            recordWrong(chinese) {
                const stats = this.getWordStats();
                if (!stats[chinese]) {
                    stats[chinese] = { correct: 0, wrong: 0 };
                }
                stats[chinese].wrong++;
                this.saveWordStats(stats);
            }

            saveFileName(name) {
                localStorage.setItem(this.KEY_FILE_NAME, name);
            }

            getFileName() {
                return localStorage.getItem(this.KEY_FILE_NAME);
            }

            saveSettings(settings) {
                localStorage.setItem(this.KEY_SETTINGS, JSON.stringify(settings));
            }

            getSettings() {
                const data = localStorage.getItem(this.KEY_SETTINGS);
                return data ? JSON.parse(data) : { mode: 'recall', order: 'normal' };
            }

            clearAll() {
                localStorage.removeItem(this.KEY_TERMS);
                localStorage.removeItem(this.KEY_STATES);
                localStorage.removeItem(this.KEY_FILE_NAME);
                localStorage.removeItem(this.KEY_STATS); // 新增：清除学习统计
            }
        }

        // ==================== 数据解析器 ====================
        class DataParser {
            static parseText(content) {
                const lines = content.replace(/\r/g, '').split('\n');
                const terms = [];

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;

                    const colonIndex = trimmed.indexOf('：');
                    if (colonIndex === -1) continue;

                    const namePart = trimmed.substring(0, colonIndex).trim();
                    const definition = trimmed.substring(colonIndex + 1).trim();

                    let chinese = namePart;
                    let english = '';

                    const openParen = namePart.indexOf('（');
                    const closeParen = namePart.indexOf('）');

                    if (openParen !== -1 && closeParen !== -1 && closeParen > openParen) {
                        chinese = namePart.substring(0, openParen).trim();
                        english = namePart.substring(openParen + 1, closeParen).trim();
                    }

                    const highlights = this.extractHighlights(definition);

                    terms.push({
                        chinese,
                        english,
                        definition,
                        highlights
                    });
                }

                return terms;
            }

            static extractHighlights(definition) {
                const highlights = [];
                const regex = /"([^"]+)"/g;
                let match;

                while ((match = regex.exec(definition)) !== null) {
                    highlights.push(match[1]);
                }

                return highlights;
            }

            static renderDefinitionWithHighlights(definition, highlights) {
                let html = definition;
                for (const highlight of highlights) {
                    const escaped = highlight.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`"${escaped}"`, 'g');
                    html = html.replace(regex, `<span class="highlight" data-text="${this.escapeHtml(highlight)}">"${this.escapeHtml(highlight)}"</span>`);
                }
                return html;
            }

            static escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // ==================== 星空背景动画 ====================
        class StarryBackground {
            constructor() {
                this.canvas = document.getElementById('starCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.stars = [];
                this.animationId = null;
                this.init();
            }

            init() {
                this.resize();
                this.createStars();
                this.animate();
                window.addEventListener('resize', () => {
                    this.resize();
                    this.createStars();
                });
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            createStars() {
                const starCount = Math.floor((this.canvas.width * this.canvas.height) / 8000);
                this.stars = [];

                for (let i = 0; i < starCount; i++) {
                    this.stars.push({
                        x: Utils.random(0, this.canvas.width),
                        y: Utils.random(0, this.canvas.height),
                        radius: Utils.random(0.5, 2),
                        opacity: Utils.random(0.3, 1),
                        opacitySpeed: Utils.random(0.001, 0.003),
                        opacityDirection: Math.random() > 0.5 ? 1 : -1,
                        driftX: Utils.random(-0.02, 0.02),
                        driftY: Utils.random(-0.02, 0.02),
                        originalX: 0,
                        originalY: 0
                    });
                    this.stars[i].originalX = this.stars[i].x;
                    this.stars[i].originalY = this.stars[i].y;
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.stars.forEach(star => {
                    star.opacity += star.opacitySpeed * star.opacityDirection;
                    if (star.opacity >= 1) {
                        star.opacity = 1;
                        star.opacityDirection = -1;
                    } else if (star.opacity <= 0.3) {
                        star.opacity = 0.3;
                        star.opacityDirection = 1;
                    }

                    star.x += star.driftX;
                    star.y += star.driftY;

                    if (Math.abs(star.x - star.originalX) > 20) {
                        star.driftX *= -1;
                    }
                    if (Math.abs(star.y - star.originalY) > 20) {
                        star.driftY *= -1;
                    }

                    this.ctx.beginPath();
                    this.ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                    this.ctx.fill();
                });

                this.animationId = requestAnimationFrame(() => this.animate());
            }
        }

        // ==================== 主应用类 ====================
        class DentMemoApp {
            constructor() {
                this.storage = new StorageManager();
                this.pageManager = new PageManager();
                this.terms = [];
                this.studyQueue = [];
                this.originalStudyList = [];
                this.currentIndex = 0;
                this.currentMode = 'recall';
                this.currentOrder = 'normal';
                this.stats = {
                    totalLearned: 0,
                    dictationCount: 0,
                    errorCount: 0,
                    skipCount: 0
                };
                // 新增：记录本次学习的错误次数
                this.sessionErrors = new Map();
                this.highlightStates = new Map();
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadSavedData();
            }

            bindEvents() {
                // 文件上传
                document.getElementById('uploadArea').addEventListener('click', () => 
                    document.getElementById('fileInput').click()
                );
                document.getElementById('fileInput').addEventListener('change', (e) => 
                    this.handleFileUpload(e)
                );
                document.getElementById('clearFileBtn').addEventListener('click', () => 
                    this.clearFile()
                );

                // 学习模式
                document.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.addEventListener('click', (e) => this.selectMode(e.target));
                });

                // 学习顺序
                document.querySelectorAll('[data-order]').forEach(btn => {
                    btn.addEventListener('click', (e) => this.selectOrder(e.target));
                });

                // 管理和开始
                document.getElementById('manageBtn').addEventListener('click', () => this.goToManage());
                document.getElementById('startBtn').addEventListener('click', () => this.startStudy());

                // 背诵模式
                document.getElementById('recallBackBtn').addEventListener('click', () => this.goHome());
                document.getElementById('chineseTerm').addEventListener('click', (e) => this.toggleBlur('chinese', e));
                document.getElementById('englishTerm').addEventListener('click', (e) => this.toggleBlur('english', e));
                document.getElementById('definitionBox').addEventListener('click', (e) => this.toggleBlur('definition', e));
                document.getElementById('recallNextBtn').addEventListener('click', () => this.recallNext());

                // 默写模式
                document.getElementById('dictationBackBtn').addEventListener('click', () => this.goHome());
                document.getElementById('dictationDontKnow').addEventListener('click', () => this.dictationDontKnow());
                document.getElementById('dictationConfirm').addEventListener('click', () => this.dictationConfirm());
                document.getElementById('dictationSkip').addEventListener('click', () => this.dictationSkip());
                document.getElementById('dictationRemembered').addEventListener('click', () => this.dictationRemembered());

                // 管理页面
                document.getElementById('manageBackBtn').addEventListener('click', () => this.goHome());
                // 新增：一键未学按钮和对话框绑定
                document.getElementById('resetAllBtn').addEventListener('click', () => this.showResetConfirm());
                document.getElementById('resetCancelBtn').addEventListener('click', () => this.hideResetConfirm());
                document.getElementById('resetConfirmBtn').addEventListener('click', () => this.resetAllToUnlearned());

                // 完成页面
                document.getElementById('backHomeBtn').addEventListener('click', () => this.goHome());
                // 新增：导出学习记录
                document.getElementById('exportStatsBtn').addEventListener('click', () => this.exportStats());

                // ESC 返回
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        if (['recall', 'dictation', 'manage'].includes(this.pageManager.currentPage)) {
                            this.goHome();
                        }
                    }
                });
            }

            loadSavedData() {
                const savedTerms = this.storage.getTerms();
                const savedFileName = this.storage.getFileName();
                const settings = this.storage.getSettings();

                if (savedTerms && savedTerms.length > 0) {
                    this.terms = savedTerms;
                    this.currentMode = settings.mode || 'recall';
                    this.currentOrder = settings.order || 'normal';
                    
                    document.querySelectorAll('[data-mode]').forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.mode === this.currentMode);
                    });
                    document.querySelectorAll('[data-order]').forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.order === this.currentOrder);
                    });

                    this.showFileInfo(savedFileName || '名词解释.txt', savedTerms.length);
                    this.showSettings();
                }
            }

            handleFileUpload(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    const terms = DataParser.parseText(content);

                    if (terms.length > 0) {
                        this.terms = terms;
                        this.storage.saveTerms(terms);
                        this.storage.saveFileName(file.name);
                        this.showFileInfo(file.name, terms.length);
                        this.showSettings();
                    } else {
                        alert('未解析到有效名词，请检查文件格式');
                    }
                };
                reader.readAsText(file, 'UTF-8');
                e.target.value = '';
            }

            showFileInfo(fileName, count) {
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('fileInfo').style.display = 'flex';
                document.getElementById('fileName').textContent = fileName;
                document.getElementById('fileCount').textContent = `共 ${count} 个名词`;
            }

            clearFile() {
                this.storage.clearAll();
                this.terms = [];
                document.getElementById('fileInfo').style.display = 'none';
                document.getElementById('uploadArea').style.display = 'block';
                document.getElementById('statsSection').style.display = 'none';
                document.getElementById('modeSection').style.display = 'none';
                document.getElementById('settingsSection').style.display = 'none';
                document.getElementById('quantitySection').style.display = 'none';
                document.getElementById('startSection').style.display = 'none';
            }

            updateHomeStats() {
                const states = this.storage.getStates();
                let unlearned = 0, recalled = 0, mastered = 0, skipped = 0;

                for (const term of this.terms) {
                    const state = states[term.chinese] || { state: 'unlearned', skip: false };
                    if (state.skip) skipped++;
                    if (state.state === 'unlearned') unlearned++;
                    else if (state.state === 'recalled') recalled++;
                    else if (state.state === 'mastered') mastered++;
                }

                const grid = document.getElementById('homeStatsGrid');
                grid.innerHTML = `
                    <div class="stat-item">
                        <div class="stat-item-value">${this.terms.length}</div>
                        <div class="stat-item-label">名词总数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-value">${unlearned}</div>
                        <div class="stat-item-label">未学习</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-value">${recalled}</div>
                        <div class="stat-item-label">已背诵</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-value">${mastered}</div>
                        <div class="stat-item-label">已掌握</div>
                    </div>
                `;
            }

            showSettings() {
                document.getElementById('statsSection').style.display = 'block';
                document.getElementById('modeSection').style.display = 'block';
                document.getElementById('settingsSection').style.display = 'block';
                document.getElementById('quantitySection').style.display = 'block';
                document.getElementById('startSection').style.display = 'block';
                this.updateHomeStats();
            }

            selectMode(btn) {
                document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.currentMode = btn.dataset.mode;
                this.storage.saveSettings({ ...this.storage.getSettings(), mode: this.currentMode });
            }

            selectOrder(btn) {
                document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.currentOrder = btn.dataset.order;
                this.storage.saveSettings({ ...this.storage.getSettings(), order: this.currentOrder });
            }

            getAvailableTerms() {
                const states = this.storage.getStates();
                return this.terms.filter(term => {
                    const state = states[term.chinese] || { state: 'unlearned', skip: false };
                    
                    if (this.currentMode === 'recall') {
                        return state.state === 'unlearned';
                    } else {
                        return !state.skip && state.state !== 'mastered';
                    }
                });
            }

            sortTerms(terms) {
                if (this.currentOrder === 'normal') return [...terms];
                if (this.currentOrder === 'reverse') return [...terms].reverse();

                if (this.currentOrder === 'random') {
                    const states = this.storage.getStates();
                    const learned = [];
                    const unlearned = [];

                    for (const term of terms) {
                        const state = states[term.chinese]?.state || 'unlearned';
                        if (state === 'recalled' || state === 'mastered') {
                            learned.push(term);
                        } else {
                            unlearned.push(term);
                        }
                    }

                    const shuffledLearned = Utils.shuffle(learned);
                    const shuffledUnlearned = Utils.shuffle(unlearned);
                    return [...shuffledLearned, ...shuffledUnlearned];
                }

                return terms;
            }

            startStudy() {
                const availableTerms = this.getAvailableTerms();

                if (availableTerms.length === 0) {
                    alert('当前模式下没有可学习的名词');
                    return;
                }

                const quantityInput = document.getElementById('quantityInput');
                let quantity = parseInt(quantityInput.value) || 10;
                quantity = Math.max(1, Math.min(100, quantity, availableTerms.length));

                const sorted = this.sortTerms(availableTerms);
                const studyTerms = sorted.slice(0, quantity);

                this.originalStudyList = [...studyTerms];
                this.studyQueue = studyTerms.map((term, index) => ({
                    ...term,
                    index,
                    completed: false
                }));
                this.currentIndex = 0;
                this.stats = {
                    totalLearned: studyTerms.length,
                    dictationCount: 0,
                    errorCount: 0,
                    skipCount: 0
                };
                // 新增：重置本次学习的错误记录
                this.sessionErrors.clear();

                if (this.currentMode === 'recall') {
                    this.startRecall();
                } else {
                    this.startDictation();
                }
            }

            startRecall() {
                this.pageManager.switchTo('recall');
                setTimeout(() => {
                    this.showRecallCurrent();
                }, 450);
            }

            showRecallCurrent() {
                while (this.currentIndex < this.studyQueue.length && 
                       this.studyQueue[this.currentIndex].completed) {
                    this.currentIndex++;
                }

                if (this.currentIndex >= this.studyQueue.length) {
                    this.completeStudy();
                    return;
                }

                const current = this.studyQueue[this.currentIndex];

                const completedCount = this.studyQueue.filter(t => t.completed).length;
                const total = this.originalStudyList.length;
                document.getElementById('recallProgressText').textContent = `${completedCount + 1} / ${total}`;
                document.getElementById('recallProgressFill').style.width = `${(completedCount / total) * 100}%`;

                const chineseEl = document.getElementById('chineseTerm');
                const englishEl = document.getElementById('englishTerm');
                const definitionEl = document.getElementById('definitionBox');

                chineseEl.textContent = current.chinese;
                chineseEl.dataset.blurState = 'visible';
                chineseEl.classList.remove('blurred');

                if (current.english) {
                    englishEl.style.display = 'block';
                    englishEl.textContent = current.english;
                    englishEl.dataset.blurState = 'blurred';
                    englishEl.classList.add('blurred');
                } else {
                    englishEl.style.display = 'none';
                }

                definitionEl.innerHTML = `<div class="definition-text">${DataParser.renderDefinitionWithHighlights(current.definition, current.highlights)}</div>`;
                definitionEl.dataset.blurState = 'blurred';
                definitionEl.classList.add('blurred');

                // 新增：设置所有重点内容初始状态为模糊
                this.highlightStates.clear();
                // 将所有重点内容标记为已模糊（初始状态）
                for (const highlight of current.highlights) {
                    this.highlightStates.set(highlight, true); // true 表示模糊
                }
                
                this.bindHighlightEvents();
                
                // 新增：给所有高亮元素添加模糊样式
                const highlights = definitionEl.querySelectorAll('.highlight');
                highlights.forEach(el => el.classList.add('blurred'));
            }

            bindHighlightEvents() {
                const highlights = document.querySelectorAll('#definitionBox .highlight');
                highlights.forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const text = el.dataset.text;
                        const isBlurred = this.highlightStates.get(text) || false;
                        
                        if (isBlurred) {
                            el.classList.remove('blurred');
                        } else {
                            el.classList.add('blurred');
                        }
                        
                        this.highlightStates.set(text, !isBlurred);
                    });
                });
            }

            toggleBlur(section, e) {
                if (e.target.classList.contains('highlight')) return;

                const el = section === 'chinese' ? document.getElementById('chineseTerm') :
                           section === 'english' ? document.getElementById('englishTerm') :
                           document.getElementById('definitionBox');

                if (!el) return;

                const currentState = el.dataset.blurState;
                
                if (currentState === 'visible') {
                    el.dataset.blurState = 'blurred';
                    el.classList.add('blurred');
                } else {
                    el.dataset.blurState = 'visible';
                    el.classList.remove('blurred');
                }
            }

            recallNext() {
                const current = this.studyQueue[this.currentIndex];
                
                const states = this.storage.getStates();
                const currentState = states[current.chinese]?.state || 'unlearned';
                let newState = currentState;
                
                if (currentState === 'unlearned') {
                    newState = 'recalled';
                } else if (currentState === 'recalled') {
                    newState = 'mastered';
                }
                
                this.storage.updateState(current.chinese, { state: newState });
                
                current.completed = true;
                this.currentIndex++;
                this.showRecallCurrent();
            }

            startDictation() {
                this.pageManager.switchTo('dictation');
                setTimeout(() => {
                    this.showDictationCurrent();
                }, 450);
            }

            showDictationCurrent() {
                while (this.currentIndex < this.studyQueue.length && 
                       this.studyQueue[this.currentIndex].completed) {
                    this.currentIndex++;
                }

                if (this.currentIndex >= this.studyQueue.length) {
                    this.completeStudy();
                    return;
                }

                const current = this.studyQueue[this.currentIndex];

                const completedCount = this.studyQueue.filter(t => t.completed).length;
                const total = this.originalStudyList.length;
                document.getElementById('dictationProgressText').textContent = `${completedCount + 1} / ${total}`;
                document.getElementById('dictationProgressFill').style.width = `${(completedCount / total) * 100}%`;

                document.getElementById('dictationChineseTerm').textContent = current.chinese;
                
                const englishEl = document.getElementById('dictationEnglishTerm');
                if (current.english) {
                    englishEl.style.display = 'block';
                    englishEl.textContent = current.english;
                } else {
                    englishEl.style.display = 'none';
                }

                const inputEl = document.getElementById('dictationInput');
                const answerEl = document.getElementById('dictationAnswer');
                
                inputEl.style.display = 'block';
                inputEl.value = '';
                inputEl.readOnly = false;
                inputEl.focus();
                
                answerEl.style.display = 'none';
                answerEl.innerHTML = `<div class="definition-text">${DataParser.renderDefinitionWithHighlights(current.definition, current.highlights)}</div>`;

                document.getElementById('dictationButtons').style.display = 'grid';
                document.getElementById('dictationAnswerButtons').style.display = 'none';
            }

            dictationDontKnow() {
                const current = this.studyQueue[this.currentIndex];
                this.stats.errorCount++;
                // 新增：记录本次错误
                this.sessionErrors.set(current.chinese, (this.sessionErrors.get(current.chinese) || 0) + 1);
                // 新增：记录累计错误
                this.storage.recordWrong(current.chinese);
                this.showAnswer(current);
            }

            dictationConfirm() {
                const current = this.studyQueue[this.currentIndex];
                const input = document.getElementById('dictationInput').value.trim();
                
                // 使用新的 normalizeAnswer 函数进行答案比较，忽略双引号
                if (this.normalizeAnswer(input) === this.normalizeAnswer(current.definition)) {
                    this.storage.updateState(current.chinese,{
                        state: 'mastered'
                    });
                    // 新增：记录累计正确
                    this.storage.recordCorrect(current.chinese);

                    this.stats.dictationCount++;
                    current.completed = true;
                    this.currentIndex++;
                    this.showDictationCurrent();
                } else {
                    this.stats.errorCount++;
                    // 新增：记录本次错误
                    this.sessionErrors.set(current.chinese, (this.sessionErrors.get(current.chinese) || 0) + 1);
                    // 新增：记录累计错误
                    this.storage.recordWrong(current.chinese);
                    this.showAnswer(current);
                }
            }

            // 新增：统一的答案预处理函数，用于默写模式答案判定
            normalizeAnswer(text) {
                if (!text) return '';
                let result = text.trim(); // 1. 去除首尾空格
                // 2. 删除所有引号字符：
                // \u0022 = " 英文双引号
                // \u0027 = ' 英文单引号  
                // \u201c = " 中文左双引号
                // \u201d = " 中文右双引号
                // \u2018 = ' 中文左单引号
                // \u2019 = ' 中文右单引号
                result = result.replace(/[\u0022\u0027\u201c\u201d\u2018\u2019]/g, '');
                return result;
            }

            // 原有的 normalizeText 保持不变（用于其他地方）
            normalizeText(text) {
                return text.replace(/\s+/g, '').replace(/[，。；：""''（）()]/g, '');
            }

            showAnswer(current) {
                //document.getElementById('dictationInput').style.display = 'none';
                const inputEl = document.getElementById('dictationInput');

                // 不隐藏
                inputEl.style.display = 'block';

                // 可以改成只读，保留用户输入
                inputEl.readOnly = true;
                
                document.getElementById('dictationAnswer').style.display = 'block';
                document.getElementById('dictationButtons').style.display = 'none';
                document.getElementById('dictationAnswerButtons').style.display = 'grid';
            }

            dictationSkip() {
                const current = this.studyQueue[this.currentIndex];
                this.storage.updateState(current.chinese, { skip: true });
                this.stats.skipCount++;
                current.completed = true;
                this.currentIndex++;
                this.showDictationCurrent();
            }

            dictationRemembered() {
                const current = this.studyQueue[this.currentIndex];
                
                const insertIndex = Math.min(this.currentIndex + 6, this.studyQueue.length);
                const termToReinsert = { ...current, completed: false };
                
                this.studyQueue.splice(this.currentIndex, 1);
                
                if (insertIndex - 1 < this.studyQueue.length) {
                    this.studyQueue.splice(insertIndex - 1, 0, termToReinsert);
                } else {
                    this.studyQueue.push(termToReinsert);
                }
                
                this.showDictationCurrent();
            }

            completeStudy() {
                document.getElementById('statTotalLearned').textContent = this.stats.totalLearned;
                document.getElementById('statDictationCount').textContent = this.stats.dictationCount;
                document.getElementById('statErrorCount').textContent = this.stats.errorCount;
                document.getElementById('statSkipCount').textContent = this.stats.skipCount;

                // 新增：显示累计错误统计
                this.renderErrorStats();

                this.pageManager.switchTo('complete');
            }

            // 新增：渲染错误统计表格
            renderErrorStats() {
                const section = document.getElementById('errorStatsSection');
                const tbody = document.getElementById('errorStatsTableBody');
                tbody.innerHTML = '';

                if (this.sessionErrors.size === 0) {
                    section.style.display = 'none';
                    return;
                }

                section.style.display = 'block';
                const wordStats = this.storage.getWordStats();

                // 收集数据并按累计错误降序排序
                const errorData = [];
                for (const [chinese, sessionErrorCount] of this.sessionErrors.entries()) {
                    const totalStats = wordStats[chinese] || { correct: 0, wrong: 0 };
                    errorData.push({
                        chinese,
                        sessionErrorCount,
                        totalWrong: totalStats.wrong
                    });
                }

                errorData.sort((a, b) => b.totalWrong - a.totalWrong);

                // 渲染表格
                errorData.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${DataParser.escapeHtml(item.chinese)}</td>
                        <td>${item.sessionErrorCount}</td>
                        <td>${item.totalWrong}</td>
                    `;
                    tbody.appendChild(row);
                });
            }

            // 新增：导出学习记录
            exportStats() {
                const wordStats = this.storage.getWordStats();
                const states = this.storage.getStates();

                // 构建CSV内容
                const csvRows = ['中文,是否学习,正确次数,错误次数'];

                for (const term of this.terms) {
                    const stats = wordStats[term.chinese] || { correct: 0, wrong: 0 };
                    const state = states[term.chinese] || { state: 'unlearned' };
                    const isLearned = (state.state === 'recalled' || state.state === 'mastered') ? '是' : '否';
                    
                    // 处理可能包含逗号的字段，用双引号包裹
                    const chineseEscaped = `"${term.chinese.replace(/"/g, '""')}"`;
                    
                    csvRows.push(`${chineseEscaped},${isLearned},${stats.correct},${stats.wrong}`);
                }

                const csvContent = csvRows.join('\n');

                // 添加BOM以支持Excel正确识别UTF-8编码
                const BOM = '\uFEFF';
                const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });

                // 创建下载链接
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'WordLearningHistory.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            goToManage() {
                this.pageManager.switchTo('manage');
                setTimeout(() => {
                    this.renderTermTable();
                }, 450);
            }

            renderTermTable() {
                const tbody = document.getElementById('termTableBody');
                tbody.innerHTML = '';
                const states = this.storage.getStates();

                this.terms.forEach((term, index) => {
                    const state = states[term.chinese] || { state: 'unlearned', skip: false };
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="checkbox-cell">
                            <input type="checkbox" ${state.skip ? 'checked' : ''} data-chinese="${DataParser.escapeHtml(term.chinese)}">
                        </td>
                        <td>${DataParser.escapeHtml(term.chinese)}</td>
                        <td>
                            <select data-chinese="${DataParser.escapeHtml(term.chinese)}">
                                <option value="unlearned" ${state.state === 'unlearned' ? 'selected' : ''}>未学习</option>
                                <option value="recalled" ${state.state === 'recalled' ? 'selected' : ''}>已背诵</option>
                                <option value="mastered" ${state.state === 'mastered' ? 'selected' : ''}>已掌握</option>
                            </select>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                tbody.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    cb.addEventListener('change', (e) => {
                        const chinese = e.target.dataset.chinese;
                        this.storage.updateState(chinese, { skip: e.target.checked });
                    });
                });

                tbody.querySelectorAll('select').forEach(sel => {
                    sel.addEventListener('change', (e) => {
                        const chinese = e.target.dataset.chinese;
                        this.storage.updateState(chinese, { state: e.target.value });
                    });
                });
            }

            // 新增：显示一键未学确认对话框
            showResetConfirm() {
                document.getElementById('resetConfirmModal').classList.add('show');
            }

            // 新增：隐藏一键未学确认对话框
            hideResetConfirm() {
                document.getElementById('resetConfirmModal').classList.remove('show');
            }

            // 新增：执行一键未学操作
            resetAllToUnlearned() {
                const states = this.storage.getStates();
                
                // 只修改学习状态，不影响 skip 和其他数据
                for (const chinese in states) {
                    if (states.hasOwnProperty(chinese)) {
                        states[chinese].state = 'unlearned';
                    }
                }
                
                // 保存到 localStorage
                this.storage.saveStates(states);
                
                // 隐藏对话框
                this.hideResetConfirm();
                
                // 刷新管理页面表格
                this.renderTermTable();
                
                // 切换回首页并刷新统计（通过 goHome 实现）
                this.goHome();
            }

            goHome() {
                this.pageManager.switchTo('home');
                setTimeout(() => {
                    this.showSettings();
                }, 450);
            }
        }

        // ==================== 初始化应用 ====================
        document.addEventListener('DOMContentLoaded', () => {
            new GradientBackground();
            new StarryBackground();
            new DentMemoApp();
        });
    </script>
</body>
